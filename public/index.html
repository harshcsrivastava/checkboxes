<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Checkbox Playground</title>
        <style>
            :root {
                --bg-top: #fbf7ef;
                --bg-bottom: #f6efe3;
                --ink: #2a2118;
                --muted: #6b5a49;
                --card: #fffaf2;
                --border: #d8c7b0;
                --accent: #d97706;
                --accent-soft: #f3c994;
                --box-edge: #b89a78;
                --box-shine: #fff3df;
                --box-shadow: rgba(137, 96, 49, 0.25);
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                padding: 28px 16px;
                font-family:
                    "Trebuchet MS", "Segoe UI", Tahoma, Geneva, Verdana,
                    sans-serif;
                color: var(--ink);
                background:
                    radial-gradient(
                        circle at 8% 5%,
                        #ffffff 0%,
                        transparent 40%
                    ),
                    radial-gradient(
                        circle at 92% 95%,
                        #f0dbc0 0%,
                        transparent 45%
                    ),
                    linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
                display: grid;
                place-items: center;
            }

            .page {
                width: min(100%, 980px);
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 20px;
                box-shadow: 0 18px 60px rgba(42, 33, 24, 0.15);
                overflow: hidden;
            }

            .hero {
                padding: 28px;
                border-bottom: 1px solid var(--border);
                background: linear-gradient(120deg, #ffedd5 0%, #fff7ed 100%);
            }

            h1 {
                margin: 0;
                font-size: clamp(1.6rem, 3vw, 2.5rem);
                letter-spacing: 0.03em;
                line-height: 1.1;
            }

            .subtitle {
                margin-top: 10px;
                color: var(--muted);
                font-size: 0.95rem;
            }

            .board {
                padding: 24px 28px 30px;
            }

            .toast-host {
                position: fixed;
                top: 18px;
                right: 18px;
                z-index: 20;
                display: grid;
                gap: 10px;
                width: min(100vw - 36px, 360px);
            }

            .toast {
                padding: 14px 16px;
                border-radius: 14px;
                border: 1px solid transparent;
                box-shadow: 0 14px 30px rgba(42, 33, 24, 0.18);
                backdrop-filter: blur(8px);
                color: #fffaf2;
                font-size: 0.95rem;
                line-height: 1.4;
                animation: toast-in 180ms ease-out;
            }

            .toast--error {
                background: linear-gradient(135deg, #b91c1c 0%, #ef4444 100%);
                border-color: rgba(255, 255, 255, 0.18);
            }

            .toast--info {
                background: linear-gradient(135deg, #b45309 0%, #f59e0b 100%);
                border-color: rgba(255, 255, 255, 0.18);
            }

            @keyframes toast-in {
                from {
                    transform: translateY(-10px);
                    opacity: 0;
                }
                to {
                    transform: translateY(0);
                    opacity: 1;
                }
            }

            #container {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(22px, 1fr));
                gap: 14px;
                align-items: center;
                padding: 18px;
                border: 1px dashed var(--border);
                border-radius: 14px;
                background: rgba(255, 255, 255, 0.65);
            }

            #container input[type="checkbox"] {
                appearance: none;
                -webkit-appearance: none;
                position: relative;
                width: 24px;
                height: 24px;
                margin: 0;
                cursor: pointer;
                border: 1px solid var(--box-edge);
                border-radius: 8px;
                background: linear-gradient(160deg, #fffdf7 0%, #f6e7d1 100%);
                box-shadow:
                    inset 0 1px 0 var(--box-shine),
                    0 5px 10px -6px var(--box-shadow);
                transform: translateZ(0);
                transition:
                    transform 160ms ease,
                    box-shadow 220ms ease,
                    border-color 220ms ease,
                    background 220ms ease;
            }

            #container input[type="checkbox"]::before {
                content: "";
                position: absolute;
                left: 6px;
                top: 2px;
                width: 8px;
                height: 14px;
                border: solid #fff;
                border-width: 0 3px 3px 0;
                transform: rotate(45deg) scale(0.15);
                transform-origin: center;
                opacity: 0;
                transition:
                    transform 180ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    opacity 140ms ease;
            }

            #container input[type="checkbox"]:hover {
                transform: translateY(-1px) scale(1.08);
                box-shadow:
                    inset 0 1px 0 var(--box-shine),
                    0 8px 16px -8px var(--box-shadow);
            }

            #container input[type="checkbox"]:checked {
                border-color: #b95d05;
                background:
                    radial-gradient(
                        circle at 30% 24%,
                        #ffc98f 0%,
                        transparent 35%
                    ),
                    linear-gradient(160deg, #ec9b3c 0%, #c36003 100%);
                box-shadow:
                    inset 0 1px 0 rgba(255, 255, 255, 0.45),
                    0 8px 16px -8px rgba(133, 72, 13, 0.45);
            }

            #container input[type="checkbox"]:checked::before {
                transform: rotate(45deg) scale(1);
                opacity: 1;
            }

            #container input[type="checkbox"]:focus-visible {
                outline: 2px solid var(--accent-soft);
                outline-offset: 2px;
            }

            @media (max-width: 640px) {
                body {
                    padding: 12px;
                }

                .hero,
                .board {
                    padding: 18px;
                }

                #container {
                    gap: 10px;
                    padding: 14px;
                }
            }
        </style>
    </head>
    <body>
        <main class="page">
            <header class="hero">
                <h1>Checkboxes</h1>
                <p class="subtitle">
                    A clean, interactive grid built from your existing
                    JavaScript.
                </p>
            </header>

            <section class="board" aria-label="checkbox grid section">
                <div id="container"></div>
            </section>
        </main>

        <div
            id="toast-host"
            class="toast-host"
            aria-live="polite"
            aria-atomic="true"
        ></div>

        <script src="/socket.io/socket.io.js"></script>
        <script>
            const socket = io();
            const container = document.getElementById("container");
            const toastHost = document.getElementById("toast-host");
            const CHECKBOX_COUNT = 100;

            function showNotification(message, type = "error") {
                if (!message) {
                    return;
                }

                const toast = document.createElement("div");
                toast.className = `toast toast--${type}`;
                toast.textContent = message;
                toastHost.appendChild(toast);

                window.setTimeout(() => {
                    toast.remove();
                }, 4000);
            }

            // SOCKET Code
            socket.on("server:checkbox:change", (data) => {
                console.log(`Server Data`, data);
                const { index, checked } = data;
                const input = document.getElementById(`checkbox-${index}`);
                if (input) {
                    input.checked = checked;
                }
            });

            socket.on("server:error", (data) => {
                showNotification(data?.error ?? "Something went wrong.");
            });

            // socket.on("connect_error", (error) => {
            //     showNotification(error.message ?? "Socket connection failed.");
            // });

            // socket.on("disconnect", () => {
            //     showNotification("Connection lost. Reconnecting...", "info");
            // });

            async function fetchStateFromServer(params) {
                while (container.firstChild) {
                    container.removeChild(container.firstChild);
                }
                const response = await fetch("/checkbox", {
                    method: "GET",
                });
                const data = await response.json();

                if (data && data.checkboxes) {
                    data.checkboxes.forEach((serverValue, index) => {
                        const input = document.createElement("input");

                        input.type = "checkbox";
                        input.id = `checkbox-${index}`;
                        input.checked = serverValue;

                        input.addEventListener("change", (event) => {
                            const checked = event.target.checked;
                            console.log("checked", { index, checked });
                            socket.emit("client:checkbox:change", {
                                index,
                                checked,
                            });
                            fetchStateFromServer();
                        });

                        container.appendChild(input);
                    });
                }
            }
            window.addEventListener("load", async () => {
                // this creates a glitch due to re-render and it is a heavy operation
                fetchStateFromServer();
            });
        </script>
    </body>
</html>
